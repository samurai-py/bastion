services:
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: bastion-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ./ollama_data:/root/.ollama
  # Se você tiver GPU NVIDIA e o nvidia-container-toolkit instalado, descomente o bloco abaixo:
  # deploy:
  #   resources:
  #     reservations:
  #       devices:
  #         - driver: nvidia
  #           count: all
  #           capabilities: [ gpu ]

  openclaw:
    build: .
    container_name: bastion-openclaw
    restart: unless-stopped
    # Run as host user so all written files are owned by the installer user (no sudo chown needed)
    user: "${BASTION_UID:-1000}:${BASTION_GID:-1000}"
    # Mapeamentos profundos para satisfazer o app do OpenClaw
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - ./config:/home/node/.openclaw:rw
      - ./skills:/home/node/.openclaw/workspace/skills:ro
      - ./personas:/home/node/.openclaw/workspace/personas:rw
      - ./SOUL.md:/home/node/.openclaw/workspace/SOUL.md:ro
      - ./USER.md:/home/node/.openclaw/workspace/USER.md:rw
      - ./AGENTS.md:/home/node/.openclaw/workspace/AGENTS.md:ro
      - ./HEARTBEAT.md:/home/node/.openclaw/workspace/HEARTBEAT.md:ro
      - tmp:/tmp:rw
    env_file: .env
    # ── Ollama Local Setup (Gemma2 27B) ──────────────────────────────
    # Para usar o Ollama local, altere as APIs no seu .env:
    # LLM_PROVIDER: "openai"
    # OPENAI_BASE_URL: "http://ollama:11434/v1"
    # AGENT_MODEL: "gemma2:27b"
    # ────────────────────────────────────────────────────────────────
    # depends_on:
    #   - ollama

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on: [ openclaw ]

volumes:
  caddy_data:
  tmp:
