# bastion.toml — all non-secret config for Bastion v3
# Secrets go in .env only — API keys, tokens. See .env.example for required variables.
# This file is safe to commit to git.

[agent]
default_model         = "claude-sonnet-4-5"
daily_budget_usd      = 5.0

[session]
db_path               = "/bastion-data/sessions.db"
autocompact_threshold = 0.80
keep_last_n           = 20

[logging]
log_path              = "/bastion-data/bastion.log"
level                 = "info"

[mcp]
tool_call_timeout_secs = 30

# MCP server URLs — replaces .bastion/mcp-servers.json (D-09)
[mcp.servers.memupalace]
url   = "http://memupalace:8001/mcp"
label = "memupalace"

[mcp.servers.skill-writer]
url   = "http://skill-writer:8002/mcp"
label = "skill-writer"

[mcp.servers.self-improving]
url   = "http://self-improving:8003/mcp"
label = "self-improving"

[channels.telegram]
enabled = true

[channels.webhook]
enabled = false
