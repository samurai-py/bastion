# Bastion default configuration
# Override via environment variables or --config flag (future)

[agent]
default_model          = "claude-sonnet-4-5"
daily_budget_usd       = 5.0

[session]
db_path                = ".bastion/sessions.db"
autocompact_threshold  = 0.80
keep_last_n            = 20

[logging]
log_path               = ".bastion/bastion.log"
level                  = "info"

[mcp]
config_path            = ".bastion/mcp-servers.json"
tool_call_timeout_secs = 30
